name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642195f882660b323c62e98 # v4.4.0
        with:
          node-version: 22

      - name: Install minifiers
        run: npm install -g terser csso-cli

      - name: Build
        run: |
          mkdir -p _site/images

          # Minify JS
          terser src/script.js -o _site/script.js --compress --mangle

          # Minify CSS
          csso src/style.css -o _site/style.css

          # Minify JSON
          for f in memes.json countdown.json specials.json; do
            python3 -c "import json,sys;json.dump(json.load(open('src/$f')),sys.stdout,separators=(',',':'))" > _site/$f
          done

          # Copy static files as-is
          cp src/index.html src/404.html _site/
          cp src/robots.txt src/sitemap.xml src/llms.txt _site/
          cp src/favicon.svg src/og-image.png _site/
          cp src/site.webmanifest _site/
          cp CNAME _site/
          cp -r src/images/ _site/images/

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac590b76de0 # v4.0.5

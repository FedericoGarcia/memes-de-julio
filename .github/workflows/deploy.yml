name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install minifiers
        run: npm install -g terser csso-cli

      - name: Build
        run: |
          mkdir -p _site

          # Minify JS
          terser src/script.js -o _site/script.js --compress --mangle

          # Minify CSS
          csso src/style.css -o _site/style.css

          # Minify JSON
          for f in memes.json countdown.json specials.json; do
            python3 -c "import json,sys;json.dump(json.load(open('src/$f')),sys.stdout,separators=(',',':'))" > _site/$f
          done

          # Copy static files as-is
          cp src/index.html src/404.html _site/
          cp src/robots.txt src/sitemap.xml src/llms.txt _site/
          cp src/favicon.svg src/og-image.png _site/
          cp src/site.webmanifest _site/
          cp CNAME _site/
          cp -r src/images/ _site/images/

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  lighthouse:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          urls: |
            https://memesdejulio.com.ar/
          temporaryPublicStorage: true
          configPath: .github/lighthouserc.json
